name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-deb:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            debhelper \
            devscripts \
            fakeroot \
            build-essential \
            python3 \
            python3-setuptools \
            python3-pip \
            python3-pyqt5 \
            python3-pil \
            python3-numpy \
            ffmpeg \
            libportaudio2 \
            pulseaudio-utils

      - name: Install pip-only dependencies
        run: |
          pip install --break-system-packages --no-deps mss pynput sounddevice

      - name: Build Debian package
        run: |
          dpkg-buildpackage -b -us -uc -j$(nproc)
        env:
          DEB_BUILD_OPTIONS: nocheck

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: recordly-deb-ubuntu-24.04
          path: ../recordly_*.deb
          if-no-files-found: error
          retention-days: 90

  build-aur:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build AUR package
        uses: ./.github/actions/build-aur
        with:
          pkgver: ${{ steps.version.outputs.version }}
          pkgrel: "1"

      - name: Upload AUR artifact
        uses: actions/upload-artifact@v4
        with:
          name: recordly-aur
          path: .aur/out/*.pkg.tar.zst
          if-no-files-found: warn
          retention-days: 90

  release:
    runs-on: ubuntu-24.04
    needs: [build-deb, build-aur]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files
        shell: bash
        run: find . -type f -name "*.deb" -o -name "*.pkg.tar.zst" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            recordly-deb-ubuntu-24.04/*.deb
            recordly-aur/*.pkg.tar.zst
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: false
