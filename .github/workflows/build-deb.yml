name: Build Packages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "README.md"
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            debhelper \
            devscripts \
            fakeroot \
            build-essential \
            python3 \
            python3-setuptools \
            python3-pip \
            python3-pyqt5 \
            python3-pil \
            python3-numpy \
            python3-opencv \
            python3-xlib \
            ffmpeg \
            libportaudio2 \
            pulseaudio-utils

      - name: Install pip-only dependencies
        run: |
          pip install --break-system-packages --no-deps mss pynput sounddevice ffmpeg-python future

      - name: Build Debian package
        run: |
          dpkg-buildpackage -b -us -uc -j$(nproc)
        env:
          DEB_BUILD_OPTIONS: nocheck

      - name: Collect .deb artifact
        shell: bash
        run: |
          mkdir -p pkg-out
          cp ../recordly_*.deb pkg-out/
          ls -lh pkg-out/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: recordly-deb-ubuntu-24.04
          path: pkg-out/*.deb
          if-no-files-found: error
          retention-days: 90

  build-aur:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package version
        id: version
        shell: bash
        run: |
          echo "version=1.0.0dev" >> "$GITHUB_OUTPUT"

      - name: Build AUR package
        uses: ./.github/actions/build-aur
        with:
          pkgver: ${{ steps.version.outputs.version }}
          pkgrel: "1"

      - name: Upload AUR artifact
        uses: actions/upload-artifact@v4
        with:
          name: recordly-aur
          path: .aur/out/*.pkg.tar.zst
          if-no-files-found: warn
          retention-days: 90
